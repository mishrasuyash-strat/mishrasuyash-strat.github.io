# ─────────────────────────────────────────────────────────────
#  SITE SETTINGS  —  edit the values in this block, then commit.
# ─────────────────────────────────────────────────────────────
title:       Suyash Mishra
tagline:     Making high-stakes decisions rigorous, verifiable, and defensible.
description: >-
  Suyash Mishra — AI product leadership and independent research on
  multi-agent systems, causal inference, game theory, and decision-making
  under uncertainty in high-stakes, regulated environments.
author:      Suyash Mishra

# Your public web address.
#   • User/organisation site (repo named  username.github.io):
#        url: "https://username.github.io"
#        baseurl: ""
#   • Project site (any other repo name, e.g. "site"):
#        url: "https://username.github.io"
#        baseurl: "/site"     <-- must match the repo name, with a leading slash
url:     ""
baseurl: ""

# Links shown in the footer / about. Leave "" to hide a given one.
social:
  email:    ""                      # you@example.com
  github:   ""                      # username  (not the full URL)
  linkedin: ""                      # in/your-handle
  scholar:  ""                      # full Google Scholar URL
  arxiv:    ""                      # full arXiv author URL
  orcid:    ""                      # 0000-0000-0000-0000

# ─────────────────────────────────────────────────────────────
#  BUILD SETTINGS  —  you normally never need to touch these.
# ─────────────────────────────────────────────────────────────
markdown:    kramdown
highlighter: rouge
permalink:   /blog/:year/:month/:day/:title/
timezone:    Europe/Zurich

kramdown:
  input: GFM
  syntax_highlighter: rouge

defaults:
  - scope: { path: "", type: posts }
    values: { layout: post }

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .gitignore
  - sharp/
