---
layout: default
---
<article class="page wrap">
  <header class="page-head prose">
    <p class="eyebrow">{{ page.eyebrow | default: "Page" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.lead %}<p class="lead">{{ page.lead }}</p>{% endif %}
  </header>
  <div class="prose page-body">
    {{ content }}
  </div>
</article>
